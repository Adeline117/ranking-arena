name = "ranking-arena-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Route through non-US Cloudflare edge to avoid Binance geo-blocking
# Smart placement was routing to blocked US regions; disabled.
# Workers subrequests egress from the colo nearest to the origin server,
# so Binance (Singapore origin) should egress from a non-US colo.
# If still blocked, set PROXY_FALLBACK_URL to a VPS-based proxy.
[placement]
mode = "smart"

[vars]
ALLOWED_ORIGINS = "https://www.arenafi.org,https://arenafi.org"
