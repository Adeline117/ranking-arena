<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #0B0A10; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { max-width: 480px; margin: 0 auto; padding: 40px 24px; }
    .card { background: #16141D; border: 1px solid #2a2633; border-radius: 16px; padding: 40px 32px; text-align: center; }
    .logo { font-size: 28px; font-weight: 800; color: #EDEDED; letter-spacing: -0.02em; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #8b6fa8; margin-bottom: 32px; text-transform: uppercase; letter-spacing: 0.1em; }
    h1 { font-size: 22px; color: #EDEDED; font-weight: 700; margin: 0 0 12px; }
    p { font-size: 14px; color: #9a9a9a; line-height: 1.6; margin: 0 0 24px; }
    .btn { display: inline-block; padding: 14px 36px; background: linear-gradient(135deg, #8b6fa8 0%, #6b4f8a 100%); color: #EDEDED; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 15px; }
    .btn:hover { opacity: 0.9; }
    .footer { margin-top: 32px; font-size: 12px; color: #5a5a5a; }
    .footer a { color: #8b6fa8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">Arena</div>
      <div class="subtitle">Crypto Trader Rankings</div>
      <h1>Confirm your email</h1>
      <p>Welcome to Arena! Click the button below to confirm your email address and start discovering the world's top crypto traders.</p>
      <a href="{{ .ConfirmationURL }}" class="btn">Confirm Email</a>
      <div class="footer">
        <p>If you didn't create an account, you can safely ignore this email.</p>
        <p><a href="https://www.arenafi.org">arenafi.org</a></p>
      </div>
    </div>
  </div>
</body>
</html>
