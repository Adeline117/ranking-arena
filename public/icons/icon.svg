<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0A10"/>
      <stop offset="100%" style="stop-color:#1a1825"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6fa8"/>
      <stop offset="100%" style="stop-color:#a88bc4"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Arena 标志 - 简化的竞技场/排行榜图标 -->
  <g transform="translate(256, 256)">
    <!-- 三个柱状图代表排行榜 -->
    <rect x="-120" y="-20" width="60" height="120" rx="8" fill="url(#accent)" opacity="0.7"/>
    <rect x="-30" y="-80" width="60" height="180" rx="8" fill="url(#accent)"/>
    <rect x="60" y="20" width="60" height="80" rx="8" fill="url(#accent)" opacity="0.5"/>
    
    <!-- 顶部皇冠/奖杯效果 -->
    <circle cx="0" cy="-110" r="20" fill="#FFD700"/>
    <polygon points="0,-140 -15,-120 15,-120" fill="#FFD700"/>
  </g>
  
  <!-- Arena 文字 -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#EDEDED" text-anchor="middle">ARENA</text>
</svg>
