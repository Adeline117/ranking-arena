<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0A10"/>
      <stop offset="100%" style="stop-color:#1a1825"/>
    </linearGradient>
    <linearGradient id="inf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b6dd7"/>
      <stop offset="50%" style="stop-color:#b88be0"/>
      <stop offset="100%" style="stop-color:#d4a847"/>
    </linearGradient>
    <linearGradient id="inf2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a847"/>
      <stop offset="100%" style="stop-color:#9b6dd7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Infinity symbol ∞ -->
  <g transform="translate(256, 256)">
    <!-- Main infinity path - smooth, thick, elegant -->
    <path d="M-60,0 C-60,-52 -100,-72 -130,-72 C-175,-72 -195,-36 -195,0 C-195,36 -175,72 -130,72 C-100,72 -60,52 -60,0 Z" 
          fill="none" stroke="url(#inf)" stroke-width="36" stroke-linecap="round"/>
    <path d="M60,0 C60,52 100,72 130,72 C175,72 195,36 195,0 C195,-36 175,-72 130,-72 C100,-72 60,-52 60,0 Z" 
          fill="none" stroke="url(#inf2)" stroke-width="36" stroke-linecap="round"/>
    <!-- Center crossing - thinner for depth -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="url(#inf)" stroke-width="36" stroke-linecap="round"/>
    
    <!-- Subtle inner glow -->
    <path d="M-60,0 C-60,-52 -100,-72 -130,-72 C-175,-72 -195,-36 -195,0 C-195,36 -175,72 -130,72 C-100,72 -60,52 -60,0 C-60,-52 100,-72 130,-72 C175,-72 195,-36 195,0 C195,36 175,72 130,72 C100,72 60,52 60,0 C60,-52 -100,-72 -130,-72"
          fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
