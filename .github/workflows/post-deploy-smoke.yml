name: Post-Deploy Smoke Test

# Runs after every successful Vercel production deployment.
# Tests 5 critical URLs. If ANY returns a non-2xx/3xx status, sends Telegram alert.
# This is the "root cause of root cause" fix: ensures no deployment
# goes live without automated verification of core paths.

on:
  deployment_status:

jobs:
  smoke-test:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    # 45s propagation + five bounded retries + rollback + notification. The
    # former 3m cap could kill the job before rollback even started.
    timeout-minutes: 10
    steps:
      - name: Wait for deployment to propagate
        run: sleep 45

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Smoke test critical paths
        id: smoke
        run: |
          BASE="https://www.arenafi.org"
          PASS=0
          FAIL=0
          FAILURES=""

          for path in "/" "/trader/soul" "/login" "/pricing" "/api/health"; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 --max-time 15 \
              --retry 2 --retry-all-errors --retry-delay 1 --retry-max-time 40 \
              "${BASE}${path}?_smoke=$(date +%s)" || true)
            case "$STATUS" in
              2??|3??)
                echo "вЬЕ PASS [$STATUS] $path"
                PASS=$((PASS+1))
                ;;
              *)
                echo "вЭМ FAIL [${STATUS:-000}] $path"
                FAIL=$((FAIL+1))
                FAILURES="${FAILURES}\nвЭМ ${path} вЖТ ${STATUS:-000}"
                ;;
            esac
          done

          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT
          echo "total=$((PASS+FAIL))" >> $GITHUB_OUTPUT

          if [ "$FAIL" -gt 0 ]; then
            # Write failures for Telegram alert
            echo "failures<<EOF" >> $GITHUB_OUTPUT
            echo -e "$FAILURES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo ""
            echo "рЯЪ® $FAIL/$((PASS+FAIL)) FAILED"
          else
            echo ""
            echo "вЬЕ $PASS/$((PASS+FAIL)) passed"
          fi

      - name: Auto-rollback on failure
        if: steps.smoke.outputs.fail != '0'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          ROLLED_BACK="false"

          # Vercel Instant Rollback selects the previous deployment that
          # actually served production. Do not infer it from READY list order:
          # deploy-gate intentionally creates READY --skip-domain candidates
          # that have never served traffic.
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "рЯФД Attempting auto-rollback..."
            set +e
            timeout 120s npx vercel@56.2.1 rollback --yes --timeout 90s \
              --token="$VERCEL_TOKEN" > /tmp/vercel-rollback.log 2>&1
            ROLLBACK_EXIT=$?
            set -e
            if [ "$ROLLBACK_EXIT" -eq 0 ]; then
              ROLLED_BACK="true"
              echo "вЬЕ Vercel confirmed rollback to the previous production deployment"
            else
              echo "вЪ†пЄП Auto-rollback failed (exit $ROLLBACK_EXIT)"
              tail -40 /tmp/vercel-rollback.log
            fi
          else
            echo "вЪ†пЄП Vercel project credentials are incomplete вАФ cannot auto-rollback"
          fi

          # Send Telegram alert with rollback status
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" ]; then
            if [ "$ROLLED_BACK" = "true" ]; then
              MSG="рЯЪ® *SMOKE TEST FAILED вЖТ ROLLBACK ACCEPTED*%0A%0A${{ steps.smoke.outputs.fail }}/${{ steps.smoke.outputs.total }} critical paths returned an unhealthy status%0A${{ steps.smoke.outputs.failures }}%0A%0ACommit: \`${GITHUB_SHA:0:8}\`%0AвЬЕ Vercel accepted the rollback to the previous deployment"
            else
              MSG="рЯЪ® *SMOKE TEST FAILED вАФ MANUAL ROLLBACK NEEDED*%0A%0A${{ steps.smoke.outputs.fail }}/${{ steps.smoke.outputs.total }} critical paths returned an unhealthy status%0A${{ steps.smoke.outputs.failures }}%0A%0ACommit: \`${GITHUB_SHA:0:8}\`%0AвЪ° Roll back: Vercel Dashboard вЖТ Deployments вЖТ Previous green вЖТ Promote"
            fi
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
              -d "text=${MSG}" \
              -d "parse_mode=Markdown" || true
          fi
          echo "::error::Post-deploy smoke test failed: ${{ steps.smoke.outputs.fail }} critical paths returned an unhealthy status"
          exit 1

      - name: Report success
        if: steps.smoke.outputs.fail == '0'
        run: echo "вЬЕ All ${{ steps.smoke.outputs.total }} critical paths healthy after deployment"

      # еЖЩиЈѓеЊДйЗСдЄЭйЫА(P2):GET smoke ињЗеРО,зФ® QA иі¶еПЈзЬЯиЈС еПСеЄЦвЖТиµЮвЖТиѓДиЃЇвЖТеИ†
      # (иЗ™еК®жЄЕзРЖ)вАФвАФ еЬ®йГ®зљ≤ељУдЄЛ(еИЖйТЯзЇІ)жКУдљП"еПСеЄЦеѓєеЕ®еСШ 500"ињЩз±їеЖЩиЈѓеЊДдЄ≠жЦ≠,
      # иАМйЭЮйЭ†жѓПжЧ•еУ®еЕµ 24h еРОжЙНеПСзО∞гАВжЬђжђ°жХідїґдЇЛзЪДиµЈзВєж≠£жШѓињЩз±ї(/hot еПСеЄЦеі©)гАВ
      # continue-on-error + дїЕеСКи≠¶дЄНиЗ™еК®еЫЮжїЪ:еЖЩйЗСдЄЭйЫАзЪДиѓѓжК•дЄНиѓ•еЫЮжїЪе•љйГ®зљ≤;
      # й¶Цжђ°з°ЃиЃ§з®≥еЃЪеРОеЖНиАГиЩСжФґзіІгАВиДЪжЬђйЫґдЊЭиµЦ(зЇѓ node+fetch),жЧ†йЬА npm ciгАВ
      - name: Write-path canary (postвЖТlikeвЖТcommentвЖТdelete)
        id: canary
        if: steps.smoke.outputs.fail == '0'
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/openclaw/schema-canary-sentinel.mjs

      - name: Alert if write-path canary failed
        if: steps.canary.outcome == 'failure'
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" ]; then
            MSG="вЪ†пЄП *еЖЩиЈѓеЊДйЗСдЄЭйЫАе§±иі•(йГ®зљ≤еРО)*%0A%0AGET иЈѓеЊДж≠£еЄЄ,дљЖ еПСеЄЦ/иµЮ/иѓДиЃЇ/еИ† йУЊиЈѓжЬЙйЧЃйҐШ%0ACommit: \`${GITHUB_SHA:0:8}\`%0AжЬ™иЗ™еК®еЫЮжїЪ вАФвАФ дЇЇеЈ•з°ЃиЃ§еЖЩиЈѓеЊД(еПѓиГљжШѓ schema/RLS/дЊЭиµЦ)гАВ"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
              -d "text=${MSG}" -d "parse_mode=Markdown" || true
          fi
          echo "::warning::Post-deploy write-path canary failed вАФ иІБдЄКжЦєжЧ•ењЧ"
