name: Post-Deploy Smoke Test

# Runs after every successful Vercel production deployment.
# Tests 5 critical URLs. If ANY returns 500, sends Telegram alert.
# This is the "root cause of root cause" fix: ensures no deployment
# goes live without automated verification of core paths.

on:
  deployment_status:

jobs:
  smoke-test:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wait for deployment to propagate
        run: sleep 45

      - name: Smoke test critical paths
        id: smoke
        run: |
          BASE="https://www.arenafi.org"
          PASS=0
          FAIL=0
          FAILURES=""

          for path in "/" "/trader/soul" "/login" "/pricing" "/api/health"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${BASE}${path}?_smoke=$(date +%s)")
            if [ "$STATUS" = "500" ] || [ "$STATUS" = "000" ]; then
              echo "❌ FAIL [$STATUS] $path"
              FAIL=$((FAIL+1))
              FAILURES="${FAILURES}\n❌ ${path} → ${STATUS}"
            else
              echo "✅ PASS [$STATUS] $path"
              PASS=$((PASS+1))
            fi
          done

          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT
          echo "total=$((PASS+FAIL))" >> $GITHUB_OUTPUT

          if [ "$FAIL" -gt 0 ]; then
            # Write failures for Telegram alert
            echo "failures<<EOF" >> $GITHUB_OUTPUT
            echo -e "$FAILURES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo ""
            echo "🚨 $FAIL/$((PASS+FAIL)) FAILED"
          else
            echo ""
            echo "✅ $PASS/$((PASS+FAIL)) passed"
          fi

      - name: Auto-rollback on failure
        if: steps.smoke.outputs.fail != '0'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          ROLLED_BACK="false"

          # Auto-rollback: find the previous production deployment and promote it
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "🔄 Attempting auto-rollback..."
            # List recent production deployments, skip the current one, promote the previous
            DEPLOYMENTS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=5&state=READY")

            # Get the second deployment (previous production) — first is the broken one
            PREV_ID=$(echo "$DEPLOYMENTS" | jq -r '.deployments[1].uid // empty')

            if [ -n "$PREV_ID" ]; then
              echo "Promoting previous deployment: $PREV_ID"
              PROMOTE_RESULT=$(curl -s -X POST \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                "https://api.vercel.com/v6/deployments/$PREV_ID/promote" 2>&1)
              echo "Promote result: $PROMOTE_RESULT"
              ROLLED_BACK="true"
              echo "✅ Auto-rollback complete"
            else
              echo "⚠️ Could not find previous deployment to rollback to"
            fi
          else
            echo "⚠️ VERCEL_TOKEN or VERCEL_PROJECT_ID not configured — cannot auto-rollback"
          fi

          # Send Telegram alert with rollback status
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" ]; then
            if [ "$ROLLED_BACK" = "true" ]; then
              MSG="🚨 *SMOKE TEST FAILED → AUTO-ROLLED BACK*%0A%0A${{ steps.smoke.outputs.fail }}/${{ steps.smoke.outputs.total }} critical paths returned 500%0A${{ steps.smoke.outputs.failures }}%0A%0ACommit: \`${GITHUB_SHA:0:8}\`%0A✅ Automatically rolled back to previous deployment"
            else
              MSG="🚨 *SMOKE TEST FAILED — MANUAL ROLLBACK NEEDED*%0A%0A${{ steps.smoke.outputs.fail }}/${{ steps.smoke.outputs.total }} critical paths returned 500%0A${{ steps.smoke.outputs.failures }}%0A%0ACommit: \`${GITHUB_SHA:0:8}\`%0A⚡ Roll back: Vercel Dashboard → Deployments → Previous green → Promote"
            fi
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
              -d "text=${MSG}" \
              -d "parse_mode=Markdown" || true
          fi
          echo "::error::Post-deploy smoke test failed: ${{ steps.smoke.outputs.fail }} critical paths returned 500"
          exit 1

      - name: Report success
        if: steps.smoke.outputs.fail == '0'
        run: echo "✅ All ${{ steps.smoke.outputs.total }} critical paths healthy after deployment"
