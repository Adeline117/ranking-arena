name: Lighthouse CI

on:
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Start server
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Lighthouse results and comment on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob') || {};

            // Find the latest Lighthouse JSON results
            const resultsDir = '.lighthouseci';
            let results = [];

            try {
              const files = fs.readdirSync(resultsDir).filter(f => f.endsWith('.json') && !f.startsWith('manifest'));
              for (const file of files) {
                const data = JSON.parse(fs.readFileSync(`${resultsDir}/${file}`, 'utf8'));
                if (data.categories) {
                  results.push({
                    url: data.finalUrl || data.requestedUrl || 'unknown',
                    performance: Math.round((data.categories.performance?.score || 0) * 100),
                    accessibility: Math.round((data.categories.accessibility?.score || 0) * 100),
                    bestPractices: Math.round((data.categories['best-practices']?.score || 0) * 100),
                    seo: Math.round((data.categories.seo?.score || 0) * 100),
                  });
                }
              }
            } catch (e) {
              console.log('Could not parse Lighthouse results:', e.message);
            }

            if (results.length === 0) {
              console.log('No Lighthouse results found');
              return;
            }

            const emoji = (score, threshold) => score >= threshold ? '✅' : '❌';

            let body = '## Lighthouse CI Results\n\n';
            body += '| Page | Performance | Accessibility | Best Practices | SEO |\n';
            body += '|------|-------------|---------------|----------------|-----|\n';

            for (const r of results) {
              const shortUrl = r.url.replace('http://localhost:3000', '');
              body += `| ${shortUrl || '/'} `;
              body += `| ${emoji(r.performance, 50)} ${r.performance} `;
              body += `| ${emoji(r.accessibility, 80)} ${r.accessibility} `;
              body += `| ${emoji(r.bestPractices, 80)} ${r.bestPractices} `;
              body += `| ${r.seo} |\n`;
            }

            body += '\n**Thresholds:** Performance > 50, Accessibility > 80, Best Practices > 80\n';

            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 14
