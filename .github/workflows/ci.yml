name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Per-SHA group, no cancel: 7 个并发会话高频直推 main，per-ref cancel-in-progress
# 会让每个 run 都被下一次 push 取消——CI 在忙碌时段永远跑不完（2026-07-02 差距
# 审计发现"CI 全红"的一半根因是 cancelled 而非 failure）。快速作业必须每个
# commit 跑完才能充当部署门禁；E2E 成本高，在 job 级单独设 per-ref cancel。
concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

env:
  NODE_ENV: test

jobs:
  # PR 只证明本地 AST/fixture/脚本契约，完全不注入生产 secret，也不联网。
  # 生产漂移是下面独立的 push-main job；PR 中尚未部署的 migration 不应拿
  # 当前生产 schema 做 diff。
  types-contract:
    name: Types generation contract (offline, no secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run gen:types:contract

  # 真实生产 diff 只允许在已合入 main 的可信代码上运行。secret 在各 step
  # 显式最小化注入；attestor 缺 DB/URL/key 任一项都会 fail-closed。
  types-live-drift:
    name: Types live drift check (push main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Regenerate from attested production and diff
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # Keep one credential in this process. New Supabase secret keys are
          # preferred; the legacy service-role value is only a compatibility
          # fallback and is exposed under the same env name.
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm run gen:types:check; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              delay=$((attempt * 10))
              echo "type generation attempt $attempt/3 failed; retrying in ${delay}s" >&2
              sleep "$delay"
            fi
          done
          exit 1

      - name: Schema contract check (代码 DB 依赖 vs 生产 schema)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run qa:schema

      - name: Column-drift check (写/读列 vs 生产 schema)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRICT_READS: '1'
        run: npm run qa:insert-drift

      - name: Read-column-drift check (.select 读列 vs 生产 schema)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run qa:read-drift

  # ─────────────────────────────────────────────
  # Stage 1: Fast pre-flight checks
  # ─────────────────────────────────────────────
  pre-checks:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration versions
        run: |
          echo "Checking for duplicate migration versions..."
          MIGRATIONS_DIR="supabase/migrations"
          if [ -d "$MIGRATIONS_DIR" ]; then
            VERSIONS=$(ls "$MIGRATIONS_DIR"/*.sql 2>/dev/null | xargs -n1 basename | sed 's/_.*//' | sort)
            DUPLICATES=$(echo "$VERSIONS" | uniq -d)
            if [ -n "$DUPLICATES" ]; then
              echo "ERROR: Duplicate migration versions found:"
              echo "$DUPLICATES"
              exit 1
            fi
            echo "All migration versions are unique"
          else
            echo "No migrations directory found, skipping check"
          fi

      - name: Security — npm audit (blocks on critical/high)
        run: |
          npm install --package-lock-only --ignore-scripts 2>/dev/null || true
          npm audit --audit-level=high || {
            echo "::error::npm audit found high/critical vulnerabilities — fix before merging"
            exit 1
          }

      - name: Security — no unsafe secret comparison
        run: |
          # Detect !== used to compare auth secrets (should use safeCompare/verifyCronSecret)
          # Pattern: variable containing "secret"/"Secret" compared with !==
          # Excludes: null checks, typeof checks, type guards, test files
          UNSAFE=$(grep -rn 'authHeader !== \|cronSecret\|CRON_SECRET.*!==' \
            app/api/ lib/api/ --include="*.ts" \
            | grep -v node_modules | grep -v __tests__ | grep -v '.test.' \
            | grep '!==' | grep -v 'safeCompare\|verifyCronSecret\|verifyAdminAuth' || true)
          if [ -n "$UNSAFE" ]; then
            echo "::error::Unsafe secret comparison found (use safeCompare/verifyCronSecret instead of !==):"
            echo "$UNSAFE"
            exit 1
          fi
          echo "No unsafe secret comparisons found ✅"

      - name: Style — no hardcoded thresholds
        run: |
          # Detect hardcoded threshold constants that should be in lib/constants/
          # Focus on patterns like: const MIN_TRADES = 5, const MAX_DRAWDOWN = 0.5
          HARDCODED=$(grep -rn 'const MIN_\|const MAX_\|const THRESHOLD\|const LIMIT_' \
            app/api/cron/ --include="*.ts" \
            | grep -v 'import\|from.*constants\|from.*thresholds' \
            | grep -v __tests__ || true)
          if [ -n "$HARDCODED" ]; then
            echo "::warning::Found hardcoded threshold constants in cron routes (should be in lib/constants/):"
            echo "$HARDCODED"
          else
            echo "No hardcoded thresholds in cron routes ✅"
          fi

      - name: Style — consistent error responses
        run: |
          # Count API routes using ad-hoc error patterns vs standard apiError/error()
          ADHOC=$(grep -rn "NextResponse.json.*error.*status:" app/api/ --include="*.ts" \
            | grep -v node_modules | grep -v __tests__ | grep -v 'apiError\|error(' | wc -l)
          STANDARD=$(grep -rn "apiError\|error(" app/api/ --include="*.ts" \
            | grep -v node_modules | grep -v __tests__ | wc -l)
          echo "Ad-hoc error responses: $ADHOC"
          echo "Standard error responses: $STANDARD"
          if [ "$ADHOC" -gt 100 ]; then
            echo "::warning::$ADHOC API routes still use ad-hoc error responses. Migrate to apiError() from lib/api/response.ts"
          fi

  # ─────────────────────────────────────────────
  # Stage 2: Lint + Type Check
  # ─────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      # The repository ruleset already requires this job. Keep the offline
      # contract here as well as in its named job so PRs cannot merge while an
      # older four-check ruleset is still being updated.
      - run: npm run gen:types:contract
      - name: Migration history shape ratchet
        run: npm run qa:migration-history-shape
      - run: npm run lint
      - run: npx tsc --noEmit
      - name: VPS process topology safety
        run: npm run qa:vps-topology
      - name: UI sweep unit contracts
        run: npm run qa:sweep-unit

      # API 鉴权覆盖兜底(默认拒绝)：无根级 middleware，313+ route 靠自觉调 auth
      # wrapper——本检查强制每个 route 要么有 auth 原语要么在显式公开白名单，
      # 堵住"忘加鉴权=fail-open"（ENTERPRISE_GAP_ANALYSIS_2026-07 差距 #3）。
      # 纯本地 fs 扫描 <1s，无外部依赖。
      - name: API auth coverage check (route 级默认拒绝)
        run: npm run qa:api-auth

      # Supabase 类型旁路棘轮：`as SupabaseClient`(裸)/`as any`-on-.from/.rpc 剥掉
      # <Database> 泛型→列漂移能编译过(2026-07 漂移类的根源)。计数只许降不许升。
      # 纯本地 fs 扫描 <1s，无外部依赖。
      - name: Supabase typed-client bypass ratchet
        run: npm run qa:cast-ratchet

      - name: Migration lint — block dangerous DDL
        run: |
          CHANGED=$(git diff --name-only origin/main -- 'supabase/migrations/' 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            DANGEROUS=$(echo "$CHANGED" | xargs grep -iEn 'DROP TABLE|DROP COLUMN|ALTER.*NOT NULL(?!.*DEFAULT)' 2>/dev/null || true)
            if [ -n "$DANGEROUS" ]; then
              echo "::error::Dangerous migration patterns detected (review manually before merging):"
              echo "$DANGEROUS"
              exit 1
            fi
            echo "Migration lint passed — no dangerous DDL found"
          else
            echo "No migration changes to lint"
          fi

  # ─────────────────────────────────────────────
  # Stage 3a: Unit Tests (parallel with build)
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov --ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # Stage 3b: Build (parallel with unit tests)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run build
        env:
          NODE_ENV: production
          # build 时 next 收集页面数据会评估路由模块，@/lib/env 对 CRON_SECRET /
          # SUPABASE_* 做 fail-fast 校验（NODE_ENV=production 时硬抛）。Vercel build
          # 这些 env 全有，CI 也只需通过静态模块校验。PR 可修改 build 脚本，
          # 因此这里永远只给 dummy，绝不把生产 Supabase/cron secret 注入 PR。
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-anon-placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-build-service-placeholder
          # CriticalEnvSchema 要求 CRON_SECRET ≥32 字符，dummy 兜底须够长。
          CRON_SECRET: ci-build-placeholder-cron-secret-0000000000

      - name: Bundle size check
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ 2>/dev/null || true
          find .next/static -name '*.js' -exec du -sh {} \; | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          TOTAL=$(find .next/static -name '*.js' -exec cat {} + | wc -c)
          echo "Total JS size: $((TOTAL / 1024))KB"
          if [ "$TOTAL" -gt 5242880 ]; then
            echo "::warning::Bundle size exceeds 5MB threshold ($((TOTAL / 1024))KB)"
          fi

      - name: Clean build artifacts for upload
        run: |
          find .next -name '*:*' -delete 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: nextjs-build
          path: .next
          retention-days: 1
          include-hidden-files: true

  # ─────────────────────────────────────────────
  # Stage 4: Public production E2E canary (push main only)
  # ─────────────────────────────────────────────
  e2e:
    name: Production E2E Canary (read-only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # 关键路径只跑 desktop smoke-critical-path（当前 5 用例），~3-5min 就
    # 完成。此前跑全量 46 spec × 4 端设备 × workers=1 × retries=2 → 永远跑不完、必到
    # 30min job 超时被取消：既不给真实 green/red 信号，又让 CI「完成」晚 30min → 每次
    # 安静 main 上的部署被 deploy-gate 白等半小时。全量矩阵（含 mobile/tablet）由
    # e2e-nightly.yml（每日 03:00 UTC）兜底。这里直接打公开生产站，不读取 secret、
    # 不下载 placeholder build artifact、不启动本地 server。E2E 仍非部署门禁
    # （门禁看 types-contract/types-live-drift 与四个核心作业），只提供 live
    # canary 信号。
    timeout-minutes: 12
    # E2E 只保留"最新 commit"一份在跑（成本控制）；被取消不影响部署门禁
    concurrency:
      group: ci-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts

      # Desktop smoke only → chromium is enough. Nightly installs webkit for the
      # full mobile/tablet matrix.
      - run: npx playwright install --with-deps chromium

      # Fast desktop smoke of the critical path. Full 4-device matrix runs nightly
      # (e2e-nightly.yml) so "works on desktop, broken on mobile" is still caught,
      # just off the deploy critical path.
      - run: npm run test:e2e:smoke
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://www.arenafi.org

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/**/*.png
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 5: Data Consistency (post-deploy verification)
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────────────
  data-consistency:
    name: Data Consistency Check
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NEXT_PUBLIC_SITE_URL: https://www.arenafi.org
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts

      - name: E2E data consistency verification
        run: npx tsx scripts/e2e-data-verify.ts --verbose
        continue-on-error: true
        id: e2e_check

      - name: Trigger pipeline evaluator (18 checks)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://www.arenafi.org/api/cron/pipeline-evaluate")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Evaluator response: $HTTP_CODE"
          echo "$BODY" | jq '.score, .issues, .critical' 2>/dev/null || echo "$BODY"
          SCORE=$(echo "$BODY" | jq -r '.score // 0' 2>/dev/null || echo "0")
          echo "score=$SCORE" >> $GITHUB_OUTPUT
        id: evaluator
        continue-on-error: true

      # schema-contract 已移到 lint-typecheck job(不依赖 build/unit-tests,独立
      # 运行,见上)。这里只留 advisory 的 ledger 核对。

      # 迁移落地核对(P1):baseline 后仓库迁移必须都在生产 ledger。
      # 首次 continue-on-error,确认一次绿色运行后提升为阻断门。
      - name: Migration ledger check (仓库迁移 vs 生产 ledger)
        run: npm run qa:migrations
        continue-on-error: true
        id: migration_ledger

      - name: Alert on data inconsistency
        if: steps.e2e_check.outcome == 'failure' || (steps.evaluator.outputs.score != '' && steps.evaluator.outputs.score < 60)
        run: |
          TELEGRAM_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          if [ -n "$TELEGRAM_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="🚨 *Arena Data Regression*%0A"
            MSG+="Commit: $(git log -1 --pretty=%h)%0A"
            MSG+="E2E: ${{ steps.e2e_check.outcome }}%0A"
            MSG+="Evaluator: ${{ steps.evaluator.outputs.score }}/100%0A"
            MSG+="$(git log -1 --pretty=%s)"
            curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG}" \
              -d "parse_mode=Markdown" || true
          fi
