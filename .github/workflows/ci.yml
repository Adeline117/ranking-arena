name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # Quick checks that run first
  pre-checks:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Check for duplicate migration version numbers
      - name: Check migration versions
        run: |
          echo "Checking for duplicate migration versions..."
          MIGRATIONS_DIR="supabase/migrations"
          if [ -d "$MIGRATIONS_DIR" ]; then
            # Extract version numbers (first 5 digits) and check for duplicates
            VERSIONS=$(ls "$MIGRATIONS_DIR"/*.sql 2>/dev/null | xargs -n1 basename | cut -c1-5 | sort)
            DUPLICATES=$(echo "$VERSIONS" | uniq -d)
            if [ -n "$DUPLICATES" ]; then
              echo "ERROR: Duplicate migration versions found:"
              echo "$DUPLICATES"
              exit 1
            fi
            echo "All migration versions are unique"
          else
            echo "No migrations directory found, skipping check"
          fi

  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Bundle size check
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ 2>/dev/null || true
          find .next/static -name '*.js' -exec du -sh {} \; | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Fail if total JS bundle exceeds 5MB
          TOTAL=$(find .next/static -name '*.js' -exec cat {} + | wc -c)
          echo "Total JS size: $((TOTAL / 1024))KB"
          if [ "$TOTAL" -gt 5242880 ]; then
            echo "::warning::Bundle size exceeds 5MB threshold ($((TOTAL / 1024))KB)"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: nextjs-build
          path: .next
          retention-days: 1
          include-hidden-files: true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v6
        with:
          name: nextjs-build
          path: .next
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
        env:
          CI: true
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
