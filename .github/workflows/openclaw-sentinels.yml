# OpenClaw 诊断哨兵 — Mac Mini 冗余（企业级差距 Phase 2 / #2 单点消除）
#
# 把只读诊断类 openclaw 脚本加成 GH Actions schedule，与 Mac Mini 的 OpenClaw
# cron 错峰冗余：Mac Mini down 时监控/告警继续（同 health-monitor.yml 的 M-17）。
# 全部用现有 GH secrets，零新凭据。抓取类脚本(住宅 IP 反封锁)不在此——必须留本地。
#
# 各哨兵自行发送 Telegram；硬失败也必须让 job 变红。pipeline-health 的三个
# 独立探针会全部执行，再由末尾聚合步骤统一传播失败；手动 workflow_dispatch 跑全部。
# 脚本内 dotenv 读 ../../.env 在 CI 无该文件时静默 no-op，改用下方 env: 注入。

name: OpenClaw Sentinels

on:
  schedule:
    - cron: '10,40 * * * *' # pipeline-health（错峰 health-monitor 的 15,45 / OpenClaw 的 0,30）
    - cron: '0 9 * * 1' # weekly-metrics 周一 09:00 UTC
    - cron: '30 6 * * *' # schema-canary 每日 06:30 UTC（错峰 Mac Mini 本地 07:30）
    - cron: '0 8 * * *' # daily-pipeline-report 每日 08:00 UTC
    - cron: '20 7 * * *' # ux-patrol 每日 07:20 UTC
    - cron: '40 8 * * *' # backup-freshness 每日 08:40 UTC（R2 备份 >26h 告警）
    - cron: '0 10 * * 1' # sentry-convergence 周一 10:00 UTC（Sentry 错误聚合）
    - cron: '50 5 * * *' # sweep-lang 四语言点击哨兵 每日 05:50 UTC（playwright 打生产）
    - cron: '15 7 * * *' # payment-path-canary 每日 07:15 UTC（PRO_FREE_PROMO 掩盖的支付路径）
  workflow_dispatch: {}

concurrency:
  group: openclaw-sentinels-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

env:
  ARENA_URL: https://www.arenafi.org

jobs:
  pipeline-health:
    # 30min 错峰 或 手动
    if: github.event.schedule == '10,40 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: pipeline-health-monitor
        id: pipeline-health-monitor
        continue-on-error: true
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/pipeline-health-monitor.mjs
      - name: trust-scorecard-snapshot（日内幂等守卫,今日已写即秒退;含净倒退 Telegram 告警）
        id: trust-scorecard-snapshot
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/qa/trust-scorecard-snapshot.mjs --daily-guard
      - name: db-size-sentinel（容量红线,日内幂等,超阈 Telegram）
        id: db-size-sentinel
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/db-size-sentinel.mjs --daily-guard
      - name: Propagate sentinel failures
        if: always()
        env:
          PIPELINE_HEALTH_OUTCOME: ${{ steps.pipeline-health-monitor.outcome }}
          TRUST_SCORECARD_OUTCOME: ${{ steps.trust-scorecard-snapshot.outcome }}
          DB_SIZE_OUTCOME: ${{ steps.db-size-sentinel.outcome }}
        run: |
          failed=()
          [[ "$PIPELINE_HEALTH_OUTCOME" == "failure" ]] && failed+=("pipeline-health-monitor")
          [[ "$TRUST_SCORECARD_OUTCOME" == "failure" ]] && failed+=("trust-scorecard-snapshot")
          [[ "$DB_SIZE_OUTCOME" == "failure" ]] && failed+=("db-size-sentinel")
          if (( ${#failed[@]} > 0 )); then
            echo "::error::Failed sentinels: ${failed[*]}"
            exit 1
          fi

  weekly-metrics:
    if: github.event.schedule == '0 9 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: weekly-metrics
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/weekly-metrics.mjs

  schema-canary:
    if: github.event.schedule == '30 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: schema-canary-sentinel（契约 + 填充率 + 写路径金丝雀，自清理）
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 填充率契约(fill-rate-check)需直连 arena schema;缺失时该检查
          # fail-open 跳过,不阻断其余检查。
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/openclaw/schema-canary-sentinel.mjs

  daily-pipeline-report:
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: daily-pipeline-report
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/daily-pipeline-report.mjs

  ux-patrol:
    if: github.event.schedule == '20 7 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: ux-patrol
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/ux-patrol.mjs

  backup-freshness:
    # R2 备份新鲜度哨兵——冗余 Mac Mini 的 09:00 crontab（R2 读凭据）
    if: github.event.schedule == '40 8 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: backup-freshness-check
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/backup-freshness-check.mjs

  sentry-convergence:
    if: github.event.schedule == '0 10 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: sentry-convergence
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/sentry-convergence.mjs

  payment-path-canary:
    # 支付路径金丝雀（差距 #2）：真跑被 PRO_FREE_PROMO 掩盖的订阅写路径 + 对账列，
    # 坏了告警。防"Stripe webhook 静默崩、promo 掩盖、关 promo 才发现"重演。
    if: github.event.schedule == '15 7 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: payment-path-canary
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/payment-path-canary.mjs

  sweep-lang:
    # 四语言点击哨兵（A-4/A-5）：playwright 打生产，机判死按钮/i18n-leak/对比度/5xx/
    # error-boundary。matrix 4 语言并行；硬发现→Telegram 告警，软发现→artifact 供人工
    # 审回归 diff。取代手工全站重扫。GH Actions runner 无 Mac Mini 的 syspolicyd/内存单点。
    if: github.event.schedule == '50 5 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false # 一个语言失败不取消其他三个
      matrix:
        lang: [en, zh, ja, ko]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - name: lang-sweep-sentinel (${{ matrix.lang }})
        # LANG_SWEEP（不是 LANG）——GH runner 会设 POSIX LANG，会冲突。
        env:
          BASE_URL: https://www.arenafi.org
          LANG_SWEEP: ${{ matrix.lang }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: node scripts/openclaw/lang-sweep-sentinel.mjs
      - name: Upload sweep ledger
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lang-sweep-ledger-${{ matrix.lang }}
          path: /tmp/lang-sweep-${{ matrix.lang }}.jsonl
          retention-days: 14
