# Arena Health Monitor — redundant backup for OpenClaw Mac Mini (M-17)
# Runs every 30 minutes, checks pipeline health, sends Telegram alerts on failure.
# This ensures monitoring continues even if Mac Mini is down.

name: Health Monitor

on:
  schedule:
    - cron: '15,45 * * * *' # Every 30 min, offset from OpenClaw (0,30)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Restore explicitly, then save explicitly only after a confirmed
      # Telegram 2xx. The job intentionally fails when health is bad, so the
      # combined cache action's post-step is not a reliable persistence point.
      - name: Restore alert-dedup marker
        uses: actions/cache/restore@v4
        with:
          path: .hm-alert-marker
          key: hm-alert-marker-${{ github.run_id }}
          restore-keys: hm-alert-marker-

      - name: Check pipeline health
        id: health
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HEALTH_URL: https://www.arenafi.org/api/health/pipeline
          HEALTH_MESSAGE_FILE: /tmp/health-monitor-message.txt
        run: |
          rm -f /tmp/pipeline-health.json "$HEALTH_MESSAGE_FILE"
          CURL_EXIT=0
          HTTP=$(curl --silent --show-error \
            --connect-timeout 5 --max-time 30 \
            --output /tmp/pipeline-health.json --write-out '%{http_code}' \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$HEALTH_URL") || CURL_EXIT=$?

          if [ "$CURL_EXIT" -ne 0 ] || [ "$HTTP" != "200" ]; then
            STATUS="down"
            MESSAGE="Health endpoint transport failure (curl=$CURL_EXIT HTTP=${HTTP:-000})"
          elif ! jq -e 'type == "object"' /tmp/pipeline-health.json >/dev/null 2>&1; then
            STATUS="down"
            MESSAGE="Health endpoint returned malformed JSON"
          else
            RAW_STATUS=$(jq -r '.status // "unknown"' /tmp/pipeline-health.json 2>/dev/null || true)
            case "$RAW_STATUS" in
              healthy|degraded|critical)
                STATUS="$RAW_STATUS"
                ;;
              *)
                STATUS="down"
                ;;
            esac
            if [ "$STATUS" = "healthy" ]; then
              MESSAGE="All systems healthy"
            elif [ "$STATUS" = "down" ]; then
              MESSAGE="Health endpoint returned unsupported status"
            else
              SUMMARY=$(jq -c '.summary // {}' /tmp/pipeline-health.json 2>/dev/null \
                | tr '\r\n' ' ' | cut -c1-1200)
              MESSAGE="$STATUS: ${SUMMARY:-summary unavailable}"
            fi
          fi

          printf '%s\n' "$MESSAGE" > "$HEALTH_MESSAGE_FILE"
          printf 'status=%s\n' "$STATUS" >> "$GITHUB_OUTPUT"
          echo "pipeline health: curl=$CURL_EXIT HTTP=${HTTP:-000} status=$STATUS"

      - name: Send Telegram alert on failure (2h dedup)
        id: telegram
        if: always() && steps.health.outputs.status != 'healthy'
        env:
          HEALTH_STATUS: ${{ steps.health.outputs.status }}
          HEALTH_MESSAGE_FILE: /tmp/health-monitor-message.txt
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CRITICAL_CHAT_ID || secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          send_telegram_alert() {
            local message="$1"
            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
              echo "::warning title=Health alert delivery failed::required Telegram secret is missing"
              echo "### Health alert delivery failed — required Telegram secret is missing" >> "$GITHUB_STEP_SUMMARY"
              return 1
            fi
            local curl_rc=0
            local http
            http=$(curl --silent --show-error \
              --connect-timeout 5 --max-time 10 \
              --output /dev/null --write-out '%{http_code}' \
              --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${message}") || curl_rc=$?
            if [ "$curl_rc" -ne 0 ] || [[ "${http:-000}" != 2* ]]; then
              echo "::warning title=Health alert delivery failed::curl=$curl_rc HTTP=${http:-000}"
              echo "### Health alert delivery failed — curl=$curl_rc HTTP=${http:-000}" >> "$GITHUB_STEP_SUMMARY"
              return 1
            fi
            echo "Health alert delivered HTTP $http"
            return 0
          }

          # This is a 2h delivery rate-limit, not an incident identity marker.
          NOW=$(date -u +%s)
          LAST=0
          if [ -f .hm-alert-marker ]; then
            RAW_LAST=$(cat .hm-alert-marker 2>/dev/null || true)
            if [[ "$RAW_LAST" =~ ^[0-9]{1,12}$ ]] && [ "$RAW_LAST" -le "$NOW" ]; then
              LAST="$RAW_LAST"
            fi
          fi
          if [ "$LAST" -gt 0 ] && [ $((NOW - LAST)) -lt 7200 ]; then
            echo "Deduped: last alert $((NOW - LAST))s ago (<2h), skipping"
            echo "delivered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEALTH_MESSAGE=$(cat "$HEALTH_MESSAGE_FILE" 2>/dev/null || echo "health details unavailable")
          MESSAGE=$(printf '🚨 [GH Actions] Arena Health: %s\n%s\nTime: %s' \
            "${HEALTH_STATUS:-down}" "$HEALTH_MESSAGE" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
          if send_telegram_alert "$MESSAGE"; then
            echo "$NOW" > .hm-alert-marker
            echo "delivered=true" >> "$GITHUB_OUTPUT"
          else
            rm -f .hm-alert-marker
            echo "delivered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save alert-dedup marker after confirmed delivery
        if: steps.telegram.outputs.delivered == 'true'
        uses: actions/cache/save@v4
        with:
          path: .hm-alert-marker
          key: hm-alert-marker-${{ github.run_id }}

      - name: Fail unhealthy health-monitor run
        if: always() && steps.health.outputs.status != 'healthy'
        env:
          HEALTH_STATUS: ${{ steps.health.outputs.status }}
        run: |
          echo "::error::Pipeline health monitor reported ${HEALTH_STATUS:-down}"
          exit 1
