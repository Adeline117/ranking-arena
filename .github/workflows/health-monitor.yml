# Arena Health Monitor — redundant backup for OpenClaw Mac Mini (M-17)
# Runs every 30 minutes, checks pipeline health, sends Telegram alerts on failure.
# This ensures monitoring continues even if Mac Mini is down.

name: Health Monitor

on:
  schedule:
    - cron: '15,45 * * * *' # Every 30 min, offset from OpenClaw (0,30)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Restore explicitly, then save explicitly only after a confirmed
      # Telegram 2xx. The job intentionally fails when health is bad, so the
      # combined cache action's post-step is not a reliable persistence point.
      - name: Restore alert-dedup marker
        uses: actions/cache/restore@v4
        with:
          path: .hm-alert-marker
          key: hm-alert-marker-v2-${{ github.run_id }}
          restore-keys: hm-alert-marker-v2-

      - name: Check pipeline health
        id: health
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HEALTH_URL: https://www.arenafi.org/api/health/pipeline
          HEALTH_MESSAGE_FILE: /tmp/health-monitor-message.txt
        run: |
          rm -f /tmp/pipeline-health.json "$HEALTH_MESSAGE_FILE"
          CURL_EXIT=0
          HTTP=$(curl --silent --show-error \
            --connect-timeout 5 --max-time 30 \
            --output /tmp/pipeline-health.json --write-out '%{http_code}' \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$HEALTH_URL") || CURL_EXIT=$?

          if [ "$CURL_EXIT" -ne 0 ] || [ "$HTTP" != "200" ]; then
            STATUS="down"
            MESSAGE="Health endpoint transport failure (curl=$CURL_EXIT HTTP=${HTTP:-000})"
          elif ! jq -e 'type == "object"' /tmp/pipeline-health.json >/dev/null 2>&1; then
            STATUS="down"
            MESSAGE="Health endpoint returned malformed JSON"
          else
            RAW_STATUS=$(jq -r '.status // "unknown"' /tmp/pipeline-health.json 2>/dev/null || true)
            case "$RAW_STATUS" in
              healthy|degraded|critical)
                STATUS="$RAW_STATUS"
                ;;
              *)
                STATUS="down"
                ;;
            esac
            if [ "$STATUS" = "healthy" ]; then
              MESSAGE="All systems healthy"
            elif [ "$STATUS" = "down" ]; then
              MESSAGE="Health endpoint returned unsupported status"
            else
              SUMMARY=$(jq -c '.summary // {}' /tmp/pipeline-health.json 2>/dev/null \
                | tr '\r\n' ' ' | cut -c1-1200)
              MESSAGE="$STATUS: ${SUMMARY:-summary unavailable}"
            fi
          fi

          printf '%s\n' "$MESSAGE" > "$HEALTH_MESSAGE_FILE"
          printf 'status=%s\n' "$STATUS" >> "$GITHUB_OUTPUT"
          echo "pipeline health: curl=$CURL_EXIT HTTP=${HTTP:-000} status=$STATUS"

      - name: Verify production main ancestry
        id: release
        env:
          RELEASE_URL: https://www.arenafi.org/api/health
          HEALTH_MESSAGE_FILE: /tmp/health-monitor-message.txt
        run: |
          rm -f /tmp/release-health.json
          CURL_EXIT=0
          HTTP=$(curl --silent --show-error \
            --connect-timeout 5 --max-time 20 \
            --output /tmp/release-health.json --write-out '%{http_code}' \
            "${RELEASE_URL}?ancestry_check=$(date -u +%s)") || CURL_EXIT=$?

          STATUS="down"
          MESSAGE=""
          if [ "$CURL_EXIT" -ne 0 ] || [[ "$HTTP" != "200" && "$HTTP" != "202" ]]; then
            MESSAGE="Release identity transport failure (curl=$CURL_EXIT HTTP=${HTTP:-000})"
          elif ! RELEASE_HEALTH=$(jq -er '.status | select(. == "healthy" or . == "degraded")' \
            /tmp/release-health.json 2>/dev/null); then
            MESSAGE="Release health status is missing or unsupported"
          elif ! SERVING=$(jq -er '.commit | select(type == "string" and test("^[0-9a-f]{40}$"))' \
            /tmp/release-health.json 2>/dev/null); then
            MESSAGE="Release identity is missing or malformed"
          elif ! git fetch origin main --quiet; then
            MESSAGE="Could not fetch origin/main for release verification"
          elif ! git cat-file -e "${SERVING}^{commit}" 2>/dev/null \
            && ! git fetch origin "$SERVING" --quiet 2>/dev/null; then
            MESSAGE="Serving release ${SERVING:0:12} is not fetchable from the repository"
          elif git merge-base --is-ancestor "$SERVING" origin/main; then
            STATUS="$RELEASE_HEALTH"
            if [ "$STATUS" = "degraded" ]; then
              MESSAGE="Production release ${SERVING:0:12} is in main ancestry but health is degraded"
            fi
          else
            STATUS="divergent"
            MESSAGE="Production release ${SERVING:0:12} is outside main ancestry"
          fi

          if [ "$STATUS" != "healthy" ]; then
            printf '\n%s\n' "$MESSAGE" >> "$HEALTH_MESSAGE_FILE"
          fi
          printf 'status=%s\n' "$STATUS" >> "$GITHUB_OUTPUT"
          echo "release ancestry: curl=$CURL_EXIT HTTP=${HTTP:-000} status=$STATUS"

      - name: Aggregate health result
        id: aggregate
        if: always()
        env:
          PIPELINE_STATUS: ${{ steps.health.outputs.status }}
          RELEASE_STATUS: ${{ steps.release.outputs.status }}
        run: |
          case "$PIPELINE_STATUS" in
            healthy|degraded|critical|down) ;;
            *) PIPELINE_STATUS="down" ;;
          esac
          case "$RELEASE_STATUS" in
            healthy|degraded|divergent|down) ;;
            *) RELEASE_STATUS="down" ;;
          esac

          if [ "$PIPELINE_STATUS" != "healthy" ]; then
            STATUS="$PIPELINE_STATUS"
          else
            STATUS="$RELEASE_STATUS"
          fi
          printf 'status=%s\n' "$STATUS" >> "$GITHUB_OUTPUT"
          echo "aggregate health: pipeline=$PIPELINE_STATUS release=$RELEASE_STATUS status=$STATUS"

      - name: Send Telegram alert on failure (2h dedup)
        id: telegram
        if: always() && steps.aggregate.outputs.status != 'healthy'
        env:
          HEALTH_STATUS: ${{ steps.aggregate.outputs.status }}
          HEALTH_MESSAGE_FILE: /tmp/health-monitor-message.txt
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CRITICAL_CHAT_ID || secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          send_telegram_alert() {
            local message="$1"
            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
              echo "::warning title=Health alert delivery failed::required Telegram secret is missing"
              echo "### Health alert delivery failed — required Telegram secret is missing" >> "$GITHUB_STEP_SUMMARY"
              return 1
            fi
            local curl_rc=0
            local http
            http=$(curl --silent --show-error \
              --connect-timeout 5 --max-time 10 \
              --output /dev/null --write-out '%{http_code}' \
              --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${message}") || curl_rc=$?
            if [ "$curl_rc" -ne 0 ] || [[ "${http:-000}" != 2* ]]; then
              echo "::warning title=Health alert delivery failed::curl=$curl_rc HTTP=${http:-000}"
              echo "### Health alert delivery failed — curl=$curl_rc HTTP=${http:-000}" >> "$GITHUB_STEP_SUMMARY"
              return 1
            fi
            echo "Health alert delivered HTTP $http"
            return 0
          }

          # This is a 2h delivery rate-limit, not an incident identity marker.
          NOW=$(date -u +%s)
          LAST=0
          if [ -f .hm-alert-marker ]; then
            RAW_LAST=$(cat .hm-alert-marker 2>/dev/null || true)
            if [[ "$RAW_LAST" =~ ^[0-9]{1,12}$ ]] && [ "$RAW_LAST" -le "$NOW" ]; then
              LAST="$RAW_LAST"
            fi
          fi
          if [ "$LAST" -gt 0 ] && [ $((NOW - LAST)) -lt 7200 ]; then
            echo "Deduped: last alert $((NOW - LAST))s ago (<2h), skipping"
            echo "delivered=false" >> "$GITHUB_OUTPUT"
            echo "outcome=deduplicated" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEALTH_MESSAGE=$(cat "$HEALTH_MESSAGE_FILE" 2>/dev/null || echo "health details unavailable")
          MESSAGE=$(printf '🚨 [GH Actions] Arena Health: %s\n%s\nTime: %s' \
            "${HEALTH_STATUS:-down}" "$HEALTH_MESSAGE" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")
          if send_telegram_alert "$MESSAGE"; then
            echo "$NOW" > .hm-alert-marker
            echo "delivered=true" >> "$GITHUB_OUTPUT"
            echo "outcome=delivered" >> "$GITHUB_OUTPUT"
          else
            rm -f .hm-alert-marker
            echo "delivered=false" >> "$GITHUB_OUTPUT"
            echo "outcome=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Save alert-dedup marker after confirmed delivery
        if: steps.telegram.outputs.delivered == 'true'
        uses: actions/cache/save@v4
        with:
          path: .hm-alert-marker
          key: hm-alert-marker-v2-${{ github.run_id }}

      - name: Open independent issue when Telegram delivery fails
        if: always() && steps.aggregate.outputs.status != 'healthy' && steps.telegram.outputs.outcome != 'delivered' && steps.telegram.outputs.outcome != 'deduplicated'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEALTH_STATUS: ${{ steps.aggregate.outputs.status }}
          HEALTH_MESSAGE_FILE: /tmp/health-monitor-message.txt
          ISSUE_TITLE: '🛑 Arena production health is unhealthy'
        run: |
          if ! ISSUES=$(gh issue list --repo "$GH_REPO" --state open \
            --search "\"$ISSUE_TITLE\" in:title" --limit 100 \
            --json number,title 2>/dev/null); then
            ISSUES='[]'
            echo "::warning title=Independent health alert degraded::could not list existing issues"
            echo "### Independent health alert degraded — could not list existing issues" >> "$GITHUB_STEP_SUMMARY"
          fi
          NUMBER=$(jq -r --arg title "$ISSUE_TITLE" \
            '.[] | select(.title == $title) | .number' <<< "$ISSUES" | head -1)
          if [ -n "$NUMBER" ]; then
            echo "Independent health issue already open: #$NUMBER"
            exit 0
          fi

          HEALTH_MESSAGE=$(cat "$HEALTH_MESSAGE_FILE" 2>/dev/null || echo "health details unavailable")
          BODY=$(printf 'Pipeline health monitor reported **%s**.\n\n%s\n\nTelegram delivery also failed, so this issue is the independent alert channel.\n\nRun: %s/actions/runs/%s' \
            "${HEALTH_STATUS:-down}" "$HEALTH_MESSAGE" \
            "https://github.com/$GH_REPO" "$GITHUB_RUN_ID")
          if ! gh issue create --repo "$GH_REPO" --title "$ISSUE_TITLE" --body "$BODY" >/dev/null; then
            echo "::warning title=Independent health alert failed::could not create GitHub issue"
            echo "### Independent health alert failed — could not create GitHub issue" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Independent health issue created"
          fi

      - name: Close independent issue after health recovery
        if: always() && steps.aggregate.outputs.status == 'healthy'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE_TITLE: '🛑 Arena production health is unhealthy'
        run: |
          if ! ISSUES=$(gh issue list --repo "$GH_REPO" --state open \
            --search "\"$ISSUE_TITLE\" in:title" --limit 100 \
            --json number,title 2>/dev/null); then
            echo "::warning title=Health recovery issue cleanup failed::could not list open issues"
            echo "### Health recovery issue cleanup failed — could not list open issues" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          NUMBER=$(jq -r --arg title "$ISSUE_TITLE" \
            '.[] | select(.title == $title) | .number' <<< "$ISSUES" | head -1)
          if [ -z "$NUMBER" ]; then exit 0; fi
          if ! gh issue comment "$NUMBER" --repo "$GH_REPO" \
            --body "✅ Pipeline health recovered. Closing automatically." >/dev/null \
            || ! gh issue close "$NUMBER" --repo "$GH_REPO" >/dev/null; then
            echo "::warning title=Health recovery issue cleanup failed::issue #$NUMBER remains open"
            echo "### Health recovery issue cleanup failed — issue #$NUMBER remains open" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Closed recovered health issue #$NUMBER"
          fi

      - name: Fail unhealthy health-monitor run
        if: always() && steps.aggregate.outputs.status != 'healthy'
        env:
          HEALTH_STATUS: ${{ steps.aggregate.outputs.status }}
        run: |
          echo "::error::Pipeline health monitor reported ${HEALTH_STATUS:-down}"
          exit 1
