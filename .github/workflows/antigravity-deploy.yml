name: Deploy to Antigravity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Type check
        run: npm run type-check
      
      - name: Run tests
        run: npm run test
        continue-on-error: true
      
      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  deploy:
    name: Deploy to Antigravity
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      
      - name: Deploy to Antigravity
        env:
          ANTIGRAVITY_TOKEN: ${{ secrets.ANTIGRAVITY_TOKEN }}
          ANTIGRAVITY_PROJECT_ID: ${{ secrets.ANTIGRAVITY_PROJECT_ID }}
        run: |
          # 安装 Antigravity CLI（根据实际 CLI 名称调整）
          # npm install -g @antigravity/cli || echo "使用其他部署方式"
          
          # 部署方式 1: 使用 Antigravity CLI
          # antigravity deploy --token=$ANTIGRAVITY_TOKEN --project=$ANTIGRAVITY_PROJECT_ID
          
          # 部署方式 2: 使用 API（如果 CLI 不可用）
          # curl -X POST "https://api.antigravity.com/v1/deploy" \
          #   -H "Authorization: Bearer $ANTIGRAVITY_TOKEN" \
          #   -H "Content-Type: application/json" \
          #   -d '{"project_id": "$ANTIGRAVITY_PROJECT_ID"}'
          
          echo "⚠️  请根据 Antigravity 的实际部署方式更新此步骤"
          echo "✅ 构建完成，等待手动部署或配置正确的部署命令"
