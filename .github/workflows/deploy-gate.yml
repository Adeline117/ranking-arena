name: Deploy Gate (CI-green production deploy)

# 企业级差距整改 C2：main 的生产部署由本 workflow 在 CI 门禁作业全绿后执行。
# 配套 vercel.json 内联 ignoreCommand（git push 不再直接触发生产构建）。
#
# 门禁只看 6 个 gate 作业：离线类型生成契约、生产类型/Schema 漂移、
# Pre-flight Checks、Lint & Type Check、Unit Tests、Build。E2E 按设计被更新
# 的 push 折叠取消（per-ref concurrency），Data Consistency 是
# continue-on-error 的 advisory——都不算门禁。
#
# 防乱序：CI 完成顺序 ≠ push 顺序，部署前核对该 run 的 SHA 仍是 origin/main
# HEAD，被超越则跳过（否则旧 commit 的迟到 CI 会把生产回滚到旧版本）。
#
# 部署后内嵌 smoke + 自动回滚（CLI 部署不产生 deployment_status 事件，
# post-deploy-smoke.yml 只覆盖 [deploy-force] 的 git 直接部署路径）。

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# cancel-in-progress 必须 false：杀死正在 vercel deploy 的 run 并不能撤销
# 已上传的部署——它会在服务端继续构建并可能晚于新部署抢占生产别名（回退）。
# false = 串行排队；排队中的旧 run 启动时会被 ancestry 检查拦下。
concurrency:
  group: deploy-gate-main
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check gate jobs (ignore E2E / advisory jobs)
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs?per_page=100" \
            --jq '[.jobs[] | {name, conclusion}]')
          echo "$JOBS"
          PASS=true
          for JOB in \
            "Types generation contract (offline, no secrets)" \
            "Types live drift check (push main only)" \
            "Pre-flight Checks" \
            "Lint & Type Check" \
            "Unit Tests" \
            "Build"; do
            C=$(echo "$JOBS" | jq -r --arg n "$JOB" '.[] | select(.name==$n) | .conclusion')
            echo "gate job [$JOB] => $C"
            [ "$C" = "success" ] || PASS=false
          done
          echo "pass=$PASS" >> "$GITHUB_OUTPUT"

      - name: Alert on red gate (deploy withheld)
        if: always() && steps.gate.outputs.pass != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          send_telegram_alert() {
            local message="$1"
            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_ALERT_CHAT_ID:-}" ]; then
              echo "::warning title=Telegram alert delivery failed::required secret is missing"
              echo "### Telegram alert delivery failed — required secret is missing" >> "$GITHUB_STEP_SUMMARY"
              return 0
            fi
            local curl_rc=0
            local http
            http=$(curl --silent --show-error \
              --connect-timeout 5 --max-time 10 \
              --output /dev/null --write-out '%{http_code}' \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_ALERT_CHAT_ID}" \
              --data-urlencode "text=${message}") || curl_rc=$?
            if [ "$curl_rc" -ne 0 ] || [[ "${http:-000}" != 2* ]]; then
              echo "::warning title=Telegram alert delivery failed::curl=$curl_rc HTTP=${http:-000}"
              echo "### Telegram alert delivery failed — curl=$curl_rc HTTP=${http:-000}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Telegram alert delivered HTTP $http"
            fi
            return 0
          }
          MESSAGE=$(printf '🛑 Deploy Gate：CI 门禁作业未全绿，已扣留生产部署\nCommit: %.8s\n修复后 push 即重新排队；紧急可用 [deploy-force]' "$HEAD_SHA")
          send_telegram_alert "$MESSAGE"
          echo "::error::CI gate jobs not green — production deploy withheld for ${HEAD_SHA:0:8}"
          exit 1

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Later the job checks out the candidate SHA, which may predate this
      # helper. Freeze the control-plane code from the current Gate revision so
      # queued older candidates cannot make post-promote enforcement disappear.
      - name: Pin release-control helper for this Gate run
        run: install -m 700 scripts/ci/enforce-vercel-release-control.mjs "$RUNNER_TEMP/enforce-vercel-release-control.mjs"

      - name: Enforce single production writer before deploy
        run: node "$RUNNER_TEMP/enforce-vercel-release-control.mjs"

      # 部署条件 = 本 run 的 SHA 比当前线上 SHA 新（git 祖先关系）。
      # 不再要求恰好等于 HEAD——连续推送爆发期里 HEAD 永远前移会饿死部署
      # （2026-07-02 实测连续 4 轮 superseded）；部署"已验证但稍旧"的 SHA
      # 是净改善，且 ancestry 检查杜绝旧 SHA 迟到回退生产。
      - name: Deploy decision (run SHA newer than serving SHA?)
        id: fresh
        run: |
          git fetch origin main --quiet
          # READY 列表会包含 --skip-domain 的未提升候选，第一条不等于线上。
          # 线上 /api/health 才是 alias 当前真正服务的 release identity。
          SERVING=$(curl -fsS "https://www.arenafi.org/api/health?release_check=$(date +%s)" \
            | jq -r '.commit // empty')
          if [ -z "$SERVING" ]; then
            echo "::error::serving SHA unavailable — refusing blind deployment"
            exit 1
          fi
          DEPLOYMENTS=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&state=READY&limit=100")
          PREVIOUS_ID=$(echo "$DEPLOYMENTS" | jq -r --arg sha "$SERVING" \
            '.deployments[] | select((.meta.gateSha // .meta.githubCommitSha // "") == $sha) | .uid' \
            | head -1)
          echo "previous_id=$PREVIOUS_ID" >> "$GITHUB_OUTPUT"
          echo "serving=$SERVING" >> "$GITHUB_OUTPUT"
          echo "serving=$SERVING run=$HEAD_SHA"
          if [ "$SERVING" = "$HEAD_SHA" ]; then
            echo "already serving ${HEAD_SHA:0:8} — skip"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "$SERVING" "$HEAD_SHA" 2>/dev/null; then
            echo "run ${HEAD_SHA:0:8} is newer than serving ${SERVING:0:8} — deploy"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "run ${HEAD_SHA:0:8} is NOT newer than serving ${SERVING:0:8} — skip (would regress)"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel (build on Vercel infra)
        id: deploy_candidate
        if: steps.fresh.outputs.deploy == 'true'
        run: |
          git checkout --quiet "$HEAD_SHA"
          # gateSha meta：CLI 部署没有 githubCommitSha，后续 run 的 ancestry
          # 判断靠它读出"当前线上是哪个 commit"
          # --skip-domain 是防迟到回退的关键：构建完成不自动抢生产域名，
          # 下一步重新读取 live SHA 后再决定是否 promote。
          # 固定 CLI，避免 `@latest` 在同一 commit 的重试间改变行为。stdout
          # 必须只保留 deployment URL；--no-wait 先释放同步 CLI，再由下一个
          # step 用 Vercel API 做 20 分钟有界等待，避免 job timeout 杀死告警。
          # 先用 CLI 自己的真实清单验证 lifecycle 文件；不能再用 gitignore
          # 模拟（Vercel 对嵌套负向规则的行为不同，曾让完整构建一直到
          # postbuild 才 MODULE_NOT_FOUND）。
          npx vercel@56.2.1 deploy --dry --format=json --yes \
            --token="$VERCEL_TOKEN" > /tmp/vercel-upload-manifest.json
          REQUIRED_BUILD_FILE=$(node -p \
            "require('./package.json').scripts['qa:build-bigint'].trim().split(/\\s+/).at(-1)")
          node -e \
            "const m=require('/tmp/vercel-upload-manifest.json'); if (!m.files.some(f=>f.path===process.argv[1])) { console.error('Vercel upload manifest is missing required build file: '+process.argv[1]); process.exit(1) }" \
            "$REQUIRED_BUILD_FILE"
          echo "Vercel upload includes required build file: $REQUIRED_BUILD_FILE"
          set +e
          npx vercel@56.2.1 deploy --prod --skip-domain --yes --no-wait --meta gateSha="$HEAD_SHA" \
            --build-env ARENA_RELEASE_SHA="$HEAD_SHA" \
            --build-env ARENA_CI_TYPES_ATTESTED=1 \
            --build-env VERCEL_BUILD_SYSTEM_REPORT=1 \
            --env ARENA_RELEASE_SHA="$HEAD_SHA" \
            --token="$VERCEL_TOKEN" > /tmp/deploy-url.txt \
            2> >(tee /tmp/vercel-deploy.stderr >&2)
          DEPLOY_EXIT=$?
          set -e
          CANDIDATE_URL=$(tail -1 /tmp/deploy-url.txt | tr -d '\r\n')
          if [ "$DEPLOY_EXIT" -eq 0 ] && [[ "$CANDIDATE_URL" != https://*.vercel.app ]]; then
            echo "Vercel returned an invalid deployment URL" | tee -a /tmp/vercel-deploy.stderr >&2
            DEPLOY_EXIT=1
          fi
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            if [[ "$CANDIDATE_URL" == https://*.vercel.app ]]; then
              timeout 60s npx vercel@56.2.1 inspect "$CANDIDATE_URL" --logs \
                --token="$VERCEL_TOKEN" > /tmp/vercel-inspect.log 2>&1 || true
            else
              : > /tmp/vercel-inspect.log
            fi
            # Strip terminal color/control codes and collapse the last relevant
            # lines into one escaped annotation. GitHub still masks secrets.
            { cat /tmp/vercel-deploy.stderr; cat /tmp/vercel-inspect.log; } \
              | sed -E $'s/\\x1B\\[[0-9;]*[[:alpha:]]//g' \
              | tail -80 > /tmp/vercel-deploy.clean
            ERROR_SUMMARY=$(grep -Ei 'error|failed|exceeded|cancel|unauthorized|forbidden|invalid|memory|module' \
              /tmp/vercel-deploy.clean | tail -12 | tr '\n' ' ' | cut -c1-1800)
            if [ -z "$ERROR_SUMMARY" ]; then
              ERROR_SUMMARY=$(tail -8 /tmp/vercel-deploy.clean | tr '\n' ' ' | cut -c1-1800)
            fi
            ERROR_SUMMARY=${ERROR_SUMMARY//'%'/'%25'}
            ERROR_SUMMARY=${ERROR_SUMMARY//$'\r'/'%0D'}
            ERROR_SUMMARY=${ERROR_SUMMARY//$'\n'/'%0A'}
            echo "::error title=Vercel candidate build failed::$ERROR_SUMMARY"
            {
              echo '### Vercel candidate build failed'
              echo '```text'
              tail -80 /tmp/vercel-deploy.clean
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$DEPLOY_EXIT"
          fi
          echo "url=$CANDIDATE_URL" >> "$GITHUB_OUTPUT"
          echo "Submitted without aliasing: $CANDIDATE_URL"

      - name: Wait for candidate READY (bounded)
        id: wait_candidate
        if: steps.fresh.outputs.deploy == 'true'
        env:
          VERCEL_DEPLOY_WAIT_TIMEOUT_MS: '1200000'
          VERCEL_DEPLOY_POLL_INTERVAL_MS: '15000'
          VERCEL_DEPLOY_REQUEST_TIMEOUT_MS: '15000'
        run: |
          DEPLOY_URL="${{ steps.deploy_candidate.outputs.url }}"
          set +e
          node scripts/ci/wait-for-vercel-deployment.mjs "$DEPLOY_URL" \
            2> >(tee /tmp/vercel-wait.stderr >&2)
          WAIT_EXIT=$?
          set -e
          if [ "$WAIT_EXIT" -ne 0 ]; then
            timeout 60s npx vercel@56.2.1 inspect "$DEPLOY_URL" --logs \
              --token="$VERCEL_TOKEN" > /tmp/vercel-inspect.log 2>&1 || true
            { cat /tmp/vercel-wait.stderr; cat /tmp/vercel-inspect.log; } \
              | sed -E $'s/\\x1B\\[[0-9;]*[[:alpha:]]//g' \
              | tail -80 > /tmp/vercel-wait.clean
            ERROR_SUMMARY=$(grep -Ei 'error|failed|exceeded|cancel|unauthorized|forbidden|invalid|memory|module|terminal|timeout' \
              /tmp/vercel-wait.clean | tail -12 | tr '\n' ' ' | cut -c1-1800)
            if [ -z "$ERROR_SUMMARY" ]; then
              ERROR_SUMMARY=$(tail -8 /tmp/vercel-wait.clean | tr '\n' ' ' | cut -c1-1800)
            fi
            ERROR_SUMMARY=${ERROR_SUMMARY//'%'/'%25'}
            ERROR_SUMMARY=${ERROR_SUMMARY//$'\r'/'%0D'}
            ERROR_SUMMARY=${ERROR_SUMMARY//$'\n'/'%0A'}
            echo "::error title=Vercel candidate did not become ready::$ERROR_SUMMARY"
            {
              echo '### Vercel candidate did not become ready'
              echo '```text'
              tail -80 /tmp/vercel-wait.clean
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$WAIT_EXIT"
          fi
          echo "Candidate READY without aliasing: $DEPLOY_URL"

      - name: Promote only if candidate is not stale after build
        id: promote_candidate
        if: steps.fresh.outputs.deploy == 'true' && steps.wait_candidate.outcome == 'success'
        run: |
          git fetch origin main --quiet
          LIVE_SHA=$(curl -fsS "https://www.arenafi.org/api/health?release_check=$(date +%s)" \
            | jq -r '.commit // empty')
          echo "post-build live=$LIVE_SHA candidate=$HEAD_SHA"
          if [ -z "$LIVE_SHA" ]; then
            echo "::error::Cannot resolve live SHA after build; refusing blind promotion"
            exit 1
          fi
          if [ "$LIVE_SHA" = "$HEAD_SHA" ]; then
            echo "Candidate already serving; no promotion needed"
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "$HEAD_SHA" "$LIVE_SHA" 2>/dev/null; then
            echo "Candidate ${HEAD_SHA:0:8} became stale while building; live ${LIVE_SHA:0:8} is newer — skip promotion"
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "$LIVE_SHA" "$HEAD_SHA" 2>/dev/null; then
            # Record the production-write intent before calling Vercel. If the
            # CLI changes the alias and then exits non-zero, always() smoke must
            # still inspect and, if needed, roll back the public release.
            echo "promoted=true" >> "$GITHUB_OUTPUT"
            npx vercel@56.2.1 promote "${{ steps.deploy_candidate.outputs.url }}" \
              --yes --token="$VERCEL_TOKEN"
            if node "$RUNNER_TEMP/enforce-vercel-release-control.mjs"; then
              echo "release_control=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Candidate was promoted but Vercel Git auto-assignment could not be disabled"
              echo "release_control=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::error::Live and candidate SHAs are not in one ancestry chain; refusing promotion"
            exit 1
          fi

      - name: Smoke test + auto-rollback
        id: smoke_release
        if: always() && steps.promote_candidate.outputs.promoted == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.fresh.outputs.previous_id }}
          EXPECTED_ROLLBACK_SHA: ${{ steps.fresh.outputs.serving }}
          RELEASE_CONTROL_RESTORED: ${{ steps.promote_candidate.outputs.release_control }}
        run: |
          send_telegram_alert() {
            local message="$1"
            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_ALERT_CHAT_ID:-}" ]; then
              echo "::warning title=Telegram alert delivery failed::required secret is missing"
              echo "### Telegram alert delivery failed — required secret is missing" >> "$GITHUB_STEP_SUMMARY"
              return 0
            fi
            local curl_rc=0
            local http
            http=$(curl --silent --show-error \
              --connect-timeout 5 --max-time 10 \
              --output /dev/null --write-out '%{http_code}' \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_ALERT_CHAT_ID}" \
              --data-urlencode "text=${message}") || curl_rc=$?
            if [ "$curl_rc" -ne 0 ] || [[ "${http:-000}" != 2* ]]; then
              echo "::warning title=Telegram alert delivery failed::curl=$curl_rc HTTP=${http:-000}"
              echo "### Telegram alert delivery failed — curl=$curl_rc HTTP=${http:-000}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Telegram alert delivered HTTP $http"
            fi
            return 0
          }
          sleep 45
          BASE="https://www.arenafi.org"
          SMOKE_FAILED=false
          if [ "$RELEASE_CONTROL_RESTORED" != "true" ]; then
            echo "::error::Vercel release control was not restored immediately after promotion"
            SMOKE_FAILED=true
          fi
          if ! scripts/post-deploy-check.sh "$BASE" "$HEAD_SHA"; then
            SMOKE_FAILED=true
          fi
          if [ "$SMOKE_FAILED" = "true" ]; then
            echo "🔄 smoke failed — rolling back to the deployment captured before release"
            ROLLBACK_CONTROL_RESTORED=false
            if [ -n "$PREVIOUS_DEPLOYMENT_ID" ] && [[ "$EXPECTED_ROLLBACK_SHA" =~ ^[0-9a-f]{40}$ ]]; then
              PROMOTE_CURL_EXIT=0
              PROMOTE_HTTP=$(curl --silent --show-error \
                --connect-timeout 5 --max-time 30 \
                --output /tmp/rollback-response.json --write-out "%{http_code}" \
                --request POST --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/promote/$PREVIOUS_DEPLOYMENT_ID") \
                || PROMOTE_CURL_EXIT=$?
              if [ "$PROMOTE_CURL_EXIT" -eq 0 ] && [[ "$PROMOTE_HTTP" == 2* ]]; then
                if node "$RUNNER_TEMP/enforce-vercel-release-control.mjs"; then
                  ROLLBACK_CONTROL_RESTORED=true
                else
                  echo "::error::Rollback was accepted but Vercel Git auto-assignment remains unverified"
                fi
                echo "Vercel accepted rollback promotion; verifying public production..."
                LAST_CONFIRMED_SHA=""
                STABLE_CONFIRMATIONS=0
                RECOVERY_SHA=""
                for attempt in $(seq 1 10); do
                  rm -f /tmp/gate-rollback-health.json
                  HEALTH_CURL_EXIT=0
                  HEALTH_HTTP=$(curl --silent --show-error \
                    --connect-timeout 3 --max-time 8 \
                    --output /tmp/gate-rollback-health.json --write-out "%{http_code}" \
                    "https://www.arenafi.org/api/health?gate_rollback_verify=$(date +%s)") \
                    || HEALTH_CURL_EXIT=$?
                  HEALTH_BODY=$(cat /tmp/gate-rollback-health.json 2>/dev/null || true)
                  HEALTH_STATUS=$(jq -r '.status // empty' <<< "$HEALTH_BODY" 2>/dev/null || true)
                  SERVING_SHA=$(jq -r '.commit // empty' <<< "$HEALTH_BODY" 2>/dev/null || true)
                  echo "rollback verification $attempt/10: curl=$HEALTH_CURL_EXIT HTTP=${HEALTH_HTTP:-000} status=${HEALTH_STATUS:-missing} serving=${SERVING_SHA:-missing} expected=$EXPECTED_ROLLBACK_SHA"
                  if [ "$HEALTH_CURL_EXIT" -eq 0 ] \
                    && [ "$HEALTH_HTTP" = "200" ] \
                    && [ "$HEALTH_STATUS" = "healthy" ] \
                    && [ "$SERVING_SHA" = "$EXPECTED_ROLLBACK_SHA" ] \
                    && [ "$SERVING_SHA" != "$HEAD_SHA" ]; then
                    if [ "$SERVING_SHA" = "$LAST_CONFIRMED_SHA" ]; then
                      STABLE_CONFIRMATIONS=$((STABLE_CONFIRMATIONS+1))
                    else
                      LAST_CONFIRMED_SHA="$SERVING_SHA"
                      STABLE_CONFIRMATIONS=1
                    fi
                    echo "healthy rollback target ${SERVING_SHA:0:8} confirmation $STABLE_CONFIRMATIONS/2"
                    if [ "$STABLE_CONFIRMATIONS" -ge 2 ]; then
                      RECOVERY_SHA="$SERVING_SHA"
                      break
                    fi
                  else
                    LAST_CONFIRMED_SHA=""
                    STABLE_CONFIRMATIONS=0
                  fi
                  if [ "$attempt" -lt 10 ]; then sleep 5; fi
                done
                if [ "$RECOVERY_SHA" = "$EXPECTED_ROLLBACK_SHA" ] \
                  && [ "$ROLLBACK_CONTROL_RESTORED" = "true" ]; then
                  ROLLED="✅ 公网已连续确认恢复到发布前健康版本 ${RECOVERY_SHA:0:8}"
                elif [ "$RECOVERY_SHA" = "$EXPECTED_ROLLBACK_SHA" ]; then
                  ROLLED="⚠️ 公网已恢复到 ${RECOVERY_SHA:0:8}，但生产域自动分配未确认关闭"
                else
                  ROLLED="⚠️ Vercel 已接受回滚请求，但公网未确认恢复到 ${EXPECTED_ROLLBACK_SHA:0:8}，需人工处理"
                fi
              else
                ROLLED="⚠️ 回滚请求失败 curl=$PROMOTE_CURL_EXIT HTTP=${PROMOTE_HTTP:-000}，需人工处理"
              fi
            else
              ROLLED="⚠️ 发布前回滚部署或精确 serving SHA 未捕获，需人工处理"
            fi
            MESSAGE=$(printf '🚨 Deploy Gate 业务/SHA smoke 失败\nCommit: %.8s\n%s' "$HEAD_SHA" "$ROLLED")
            send_telegram_alert "$MESSAGE"
            echo "alerted=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "✅ deploy + smoke green for ${HEAD_SHA:0:8}"
          # 回滚锚点 = Vercel 部署历史本身：每个 READY 生产部署都带
          # --meta gateSha 记录其 commit，且 smoke 通过后才成为最新 READY。
          # promote API 直接选"上一个 READY"即可，无需额外 git tag
          # （曾尝试推 last-known-good tag，被仓库 PR-only ruleset 拒绝——
          # 且与 Vercel 历史冗余，已移除）。

      - name: Finalize single production writer
        if: always() && steps.promote_candidate.outputs.promoted == 'true'
        run: node "$RUNNER_TEMP/enforce-vercel-release-control.mjs"

      # deploy/smoke 步骤本身失败(如 VERCEL_TOKEN 失效)此前静默——补告警。
      # 2026-07-03 血泪：CLI 登录 token 过期 → deploy 步骤 fail → 生产停在旧部署
      # 且无告警。job 级 failure() 兜底，任何非 CI-red 的失败也发声。
      - name: Alert on deploy/smoke step failure
        if: failure() && steps.gate.outputs.pass == 'true' && steps.smoke_release.outputs.alerted != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          send_telegram_alert() {
            local message="$1"
            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_ALERT_CHAT_ID:-}" ]; then
              echo "::warning title=Telegram alert delivery failed::required secret is missing"
              echo "### Telegram alert delivery failed — required secret is missing" >> "$GITHUB_STEP_SUMMARY"
              return 0
            fi
            local curl_rc=0
            local http
            http=$(curl --silent --show-error \
              --connect-timeout 5 --max-time 10 \
              --output /dev/null --write-out '%{http_code}' \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_ALERT_CHAT_ID}" \
              --data-urlencode "text=${message}") || curl_rc=$?
            if [ "$curl_rc" -ne 0 ] || [[ "${http:-000}" != 2* ]]; then
              echo "::warning title=Telegram alert delivery failed::curl=$curl_rc HTTP=${http:-000}"
              echo "### Telegram alert delivery failed — curl=$curl_rc HTTP=${http:-000}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Telegram alert delivered HTTP $http"
            fi
            return 0
          }
          MESSAGE=$(printf '🚨 Deploy Gate 部署步骤失败（非 CI-red）\nCommit: %.8s\n生产停在旧部署，未更新。优先查 Actions annotation、Vercel Inspect 与 build system report；仅项目检索失败时优先怀疑 token。' "$HEAD_SHA")
          send_telegram_alert "$MESSAGE"
