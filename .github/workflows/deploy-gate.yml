name: Deploy Gate (CI-green production deploy)

# 企业级差距整改 C2：main 的生产部署由本 workflow 在 CI 门禁作业全绿后执行。
# 配套 vercel.json 内联 ignoreCommand（git push 不再直接触发生产构建）。
#
# 门禁只看 4 个 gate 作业：Pre-flight Checks / Lint & Type Check / Unit Tests /
# Build。E2E 按设计被更新的 push 折叠取消（per-ref concurrency），Data
# Consistency 是 continue-on-error 的 advisory——都不算门禁。
#
# 防乱序：CI 完成顺序 ≠ push 顺序，部署前核对该 run 的 SHA 仍是 origin/main
# HEAD，被超越则跳过（否则旧 commit 的迟到 CI 会把生产回滚到旧版本）。
#
# 部署后内嵌 smoke + 自动回滚（CLI 部署不产生 deployment_status 事件，
# post-deploy-smoke.yml 只覆盖 [deploy-force] 的 git 直接部署路径）。

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# cancel-in-progress 必须 false：杀死正在 vercel deploy 的 run 并不能撤销
# 已上传的部署——它会在服务端继续构建并可能晚于新部署抢占生产别名（回退）。
# false = 串行排队；排队中的旧 run 启动时会被 ancestry 检查拦下。
concurrency:
  group: deploy-gate-main
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check gate jobs (ignore E2E / advisory jobs)
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs?per_page=50" \
            --jq '[.jobs[] | {name, conclusion}]')
          echo "$JOBS"
          PASS=true
          for JOB in "Pre-flight Checks" "Lint & Type Check" "Unit Tests" "Build"; do
            C=$(echo "$JOBS" | jq -r --arg n "$JOB" '.[] | select(.name==$n) | .conclusion')
            echo "gate job [$JOB] => $C"
            [ "$C" = "success" ] || PASS=false
          done
          echo "pass=$PASS" >> "$GITHUB_OUTPUT"

      - name: Alert on red gate (deploy withheld)
        if: steps.gate.outputs.pass != 'true'
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
              -d "text=🛑 Deploy Gate：CI 门禁作业未全绿，已扣留生产部署%0ACommit: ${HEAD_SHA:0:8}%0A修复后 push 即重新排队；紧急可用 [deploy-force]" || true
          fi
          echo "::error::CI gate jobs not green — production deploy withheld for ${HEAD_SHA:0:8}"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 部署条件 = 本 run 的 SHA 比当前线上 SHA 新（git 祖先关系）。
      # 不再要求恰好等于 HEAD——连续推送爆发期里 HEAD 永远前移会饿死部署
      # （2026-07-02 实测连续 4 轮 superseded）；部署"已验证但稍旧"的 SHA
      # 是净改善，且 ancestry 检查杜绝旧 SHA 迟到回退生产。
      - name: Deploy decision (run SHA newer than serving SHA?)
        id: fresh
        run: |
          git fetch origin main --quiet
          # READY 列表会包含 --skip-domain 的未提升候选，第一条不等于线上。
          # 线上 /api/health 才是 alias 当前真正服务的 release identity。
          SERVING=$(curl -fsS "https://www.arenafi.org/api/health?release_check=$(date +%s)" \
            | jq -r '.commit // empty')
          if [ -z "$SERVING" ]; then
            echo "::error::serving SHA unavailable — refusing blind deployment"
            exit 1
          fi
          DEPLOYMENTS=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&state=READY&limit=100")
          PREVIOUS_ID=$(echo "$DEPLOYMENTS" | jq -r --arg sha "$SERVING" \
            '.deployments[] | select((.meta.gateSha // .meta.githubCommitSha // "") == $sha) | .uid' \
            | head -1)
          echo "previous_id=$PREVIOUS_ID" >> "$GITHUB_OUTPUT"
          echo "serving=$SERVING run=$HEAD_SHA"
          if [ "$SERVING" = "$HEAD_SHA" ]; then
            echo "already serving ${HEAD_SHA:0:8} — skip"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "$SERVING" "$HEAD_SHA" 2>/dev/null; then
            echo "run ${HEAD_SHA:0:8} is newer than serving ${SERVING:0:8} — deploy"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "run ${HEAD_SHA:0:8} is NOT newer than serving ${SERVING:0:8} — skip (would regress)"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel (build on Vercel infra)
        id: deploy_candidate
        if: steps.fresh.outputs.deploy == 'true'
        run: |
          git checkout --quiet "$HEAD_SHA"
          # gateSha meta：CLI 部署没有 githubCommitSha，后续 run 的 ancestry
          # 判断靠它读出"当前线上是哪个 commit"
          # --skip-domain 是防迟到回退的关键：构建完成不自动抢生产域名，
          # 下一步重新读取 live SHA 后再决定是否 promote。
          # 固定 CLI，避免 `@latest` 在同一 commit 的重试间改变行为。stdout
          # 必须只保留 deployment URL；官方 `--logs` 走 stderr，失败时提炼为
          # Actions annotation，使未登录的值班检查也能看到真实 Vercel 原因。
          set +e
          npx vercel@56.2.1 deploy --prod --skip-domain --yes --logs --meta gateSha="$HEAD_SHA" \
            --build-env ARENA_RELEASE_SHA="$HEAD_SHA" \
            --build-env VERCEL_BUILD_SYSTEM_REPORT=1 \
            --env ARENA_RELEASE_SHA="$HEAD_SHA" \
            --token="$VERCEL_TOKEN" > /tmp/deploy-url.txt \
            2> >(tee /tmp/vercel-deploy.stderr >&2)
          DEPLOY_EXIT=$?
          set -e
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            CANDIDATE_URL=$(tail -1 /tmp/deploy-url.txt | tr -d '\r\n')
            if [[ "$CANDIDATE_URL" == https://*.vercel.app ]]; then
              npx vercel@56.2.1 inspect "$CANDIDATE_URL" --logs \
                --token="$VERCEL_TOKEN" > /tmp/vercel-inspect.log 2>&1 || true
            else
              : > /tmp/vercel-inspect.log
            fi
            # Strip terminal color/control codes and collapse the last relevant
            # lines into one escaped annotation. GitHub still masks secrets.
            { cat /tmp/vercel-deploy.stderr; cat /tmp/vercel-inspect.log; } \
              | sed -E $'s/\\x1B\\[[0-9;]*[[:alpha:]]//g' \
              | tail -80 > /tmp/vercel-deploy.clean
            ERROR_SUMMARY=$(grep -Ei 'error|failed|exceeded|cancel|unauthorized|forbidden|invalid|memory|module' \
              /tmp/vercel-deploy.clean | tail -12 | tr '\n' ' ' | cut -c1-1800)
            if [ -z "$ERROR_SUMMARY" ]; then
              ERROR_SUMMARY=$(tail -8 /tmp/vercel-deploy.clean | tr '\n' ' ' | cut -c1-1800)
            fi
            ERROR_SUMMARY=${ERROR_SUMMARY//'%'/'%25'}
            ERROR_SUMMARY=${ERROR_SUMMARY//$'\r'/'%0D'}
            ERROR_SUMMARY=${ERROR_SUMMARY//$'\n'/'%0A'}
            echo "::error title=Vercel candidate build failed::$ERROR_SUMMARY"
            {
              echo '### Vercel candidate build failed'
              echo '```text'
              tail -80 /tmp/vercel-deploy.clean
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$DEPLOY_EXIT"
          fi
          DEPLOY_URL=$(cat /tmp/deploy-url.txt)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Built without aliasing: $DEPLOY_URL"

      - name: Promote only if candidate is not stale after build
        id: promote_candidate
        if: steps.fresh.outputs.deploy == 'true'
        run: |
          git fetch origin main --quiet
          LIVE_SHA=$(curl -fsS "https://www.arenafi.org/api/health?release_check=$(date +%s)" \
            | jq -r '.commit // empty')
          echo "post-build live=$LIVE_SHA candidate=$HEAD_SHA"
          if [ -z "$LIVE_SHA" ]; then
            echo "::error::Cannot resolve live SHA after build; refusing blind promotion"
            exit 1
          fi
          if [ "$LIVE_SHA" = "$HEAD_SHA" ]; then
            echo "Candidate already serving; no promotion needed"
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "$HEAD_SHA" "$LIVE_SHA" 2>/dev/null; then
            echo "Candidate ${HEAD_SHA:0:8} became stale while building; live ${LIVE_SHA:0:8} is newer — skip promotion"
            echo "promoted=false" >> "$GITHUB_OUTPUT"
          elif git merge-base --is-ancestor "$LIVE_SHA" "$HEAD_SHA" 2>/dev/null; then
            npx vercel@56.2.1 promote "${{ steps.deploy_candidate.outputs.url }}" \
              --yes --token="$VERCEL_TOKEN"
            echo "promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Live and candidate SHAs are not in one ancestry chain; refusing promotion"
            exit 1
          fi

      - name: Smoke test + auto-rollback
        if: steps.promote_candidate.outputs.promoted == 'true'
        run: |
          sleep 45
          BASE="https://www.arenafi.org"
          if ! scripts/post-deploy-check.sh "$BASE" "$HEAD_SHA"; then
            echo "🔄 smoke failed — rolling back to the deployment captured before release"
            PREV_ID="${{ steps.fresh.outputs.previous_id }}"
            if [ -n "$PREV_ID" ]; then
              PROMOTE_HTTP=$(curl -sS -o /tmp/rollback-response.json -w "%{http_code}" \
                -X POST -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/promote/$PREV_ID" || true)
              case "$PROMOTE_HTTP" in
                2??) ROLLED="已自动回滚到发布前部署 $PREV_ID" ;;
                *) ROLLED="⚠️ 回滚请求失败 HTTP ${PROMOTE_HTTP:-000}，需人工处理" ;;
              esac
            else
              ROLLED="⚠️ 发布前未捕获回滚部署，需人工处理"
            fi
            if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d "chat_id=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
                -d "text=🚨 Deploy Gate 业务/SHA smoke 失败%0ACommit: ${HEAD_SHA:0:8}%0A${ROLLED}" || true
            fi
            exit 1
          fi
          echo "✅ deploy + smoke green for ${HEAD_SHA:0:8}"
          # 回滚锚点 = Vercel 部署历史本身：每个 READY 生产部署都带
          # --meta gateSha 记录其 commit，且 smoke 通过后才成为最新 READY。
          # promote API 直接选"上一个 READY"即可，无需额外 git tag
          # （曾尝试推 last-known-good tag，被仓库 PR-only ruleset 拒绝——
          # 且与 Vercel 历史冗余，已移除）。

      # deploy/smoke 步骤本身失败(如 VERCEL_TOKEN 失效)此前静默——补告警。
      # 2026-07-03 血泪：CLI 登录 token 过期 → deploy 步骤 fail → 生产停在旧部署
      # 且无告警。job 级 failure() 兜底，任何非 CI-red 的失败也发声。
      - name: Alert on deploy/smoke step failure
        if: failure() && steps.gate.outputs.pass == 'true'
        run: |
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
              -d "text=🚨 Deploy Gate 部署步骤失败（非 CI-red）%0ACommit: ${HEAD_SHA:0:8}%0A生产停在旧部署，未更新。优先查 Actions annotation、Vercel Inspect 与 build system report；仅项目检索失败时优先怀疑 token。" || true
          fi
