name: Build Ingest Worker Image

# Builds the immutable ingest-worker container (worker/Dockerfile.ingest) and pushes
# it to GitHub Container Registry (ghcr.io). The SG box then `docker run`s a fixed
# digest — it NEVER runs npm/playwright-install (the 2026-06-30 crash-loop hazard).
# This is the container form of the dependency-safe deploy; see the tarball pipeline
# in deploy-ingest-sg.yml and the cutover steps in docs/INGEST_WORKER_DEPLOY.md.
#
# No extra secrets: pushing to ghcr.io uses the built-in GITHUB_TOKEN. The image is
# private to the repo by default; the SG box pulls it with a read:packages PAT (set
# during cutover — see the runbook).

on:
  workflow_dispatch: {}
  # The production Gate requires every live worker to report the exact release
  # HEAD. Build every main SHA, including app-only and migration-only commits,
  # so that invariant never names a container tag that cannot exist.
  push:
    branches: [main]

concurrency:
  group: build-ingest-image
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      # OCI image repository names must be lowercase. GitHub preserves the
      # account's display casing in GITHUB_REPOSITORY (Adeline117/...), which
      # otherwise makes buildx reject the tag before the Docker build starts.
      - name: Prepare lowercase image name
        shell: bash
        run: |
          repo=$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$repo/ingest-worker" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push (tagged by SHA + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile.ingest
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # The image smoke-test: it must boot far enough to load every module (the
      # .js-drop guard) before we trust the tag. It will exit on the missing DB/Redis
      # env — that's expected; a "Cannot find module" is NOT and fails the job.
      - name: Smoke — image boots + all modules resolve
        run: |
          set -o pipefail
          out=$(docker run --rm --entrypoint node "${IMAGE}:${{ github.sha }}" \
            -e "['bullmq','ioredis','viem','abitype','luxon','playwright','tsx','dotenv','pg','ccxt'].forEach(m=>require.resolve(m));console.log('modules-ok')" 2>&1) || true
          echo "$out"
          echo "$out" | grep -q 'modules-ok' || { echo "::error::image module resolution failed"; exit 1; }
