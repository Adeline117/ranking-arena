<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0A10"/>
      <stop offset="100%" style="stop-color:#1a1825"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6fa8"/>
      <stop offset="100%" style="stop-color:#a88bc4"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  
  <!-- Arena 标志 - 简化的竞技场/排行榜图标 -->
  <g transform="translate(512, 480)">
    <!-- 三个柱状图代表排行榜 -->
    <rect x="-240" y="-40" width="120" height="240" rx="16" fill="url(#accent)" opacity="0.7"/>
    <rect x="-60" y="-160" width="120" height="360" rx="16" fill="url(#accent)"/>
    <rect x="120" y="40" width="120" height="160" rx="16" fill="url(#accent)" opacity="0.5"/>
    
    <!-- 顶部皇冠/奖杯效果 -->
    <circle cx="0" cy="-220" r="40" fill="#FFD700"/>
    <polygon points="0,-280 -30,-240 30,-240" fill="#FFD700"/>
  </g>
  
  <!-- Arena 文字 -->
  <text x="512" y="840" font-family="Arial, sans-serif" font-size="128" font-weight="bold" fill="#EDEDED" text-anchor="middle">ARENA</text>
</svg>
